<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>StockMaster | Gestión de Inventario</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />

</head>

<body class="antialiased text-slate-800 bg-slate-100">

  <div class="flex min-h-screen overflow-hidden">

    <!-- MAIN -->
    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">

      <!-- HEADER -->
      <header
        class="min-h-[80px] bg-white border-b border-slate-200 flex flex-col md:flex-row items-center justify-between px-4 md:px-10 py-4 gap-4">

        <!-- LOGO -->
        <div class="flex items-center gap-4">

          <div
            class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-200 text-white text-xl">
            📦
          </div>

          <div>

            <h1 class="text-2xl md:text-3xl font-black text-slate-900 tracking-tight leading-none">
              StockMaster
            </h1>

            <p class="text-xs font-bold text-indigo-600 uppercase tracking-widest mt-1">
              Gestión de Inventario
            </p>

          </div>

        </div>

        <!-- BUSCADOR -->
        <div class="relative w-full md:w-auto">

          <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
            🔍
          </span>

          <input type="text" id="buscador" placeholder="Buscar en el catálogo..."
            class="block w-full md:w-80 pl-10 pr-4 py-3 border border-slate-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all text-sm bg-slate-50" />

        </div>

      </header>

      <!-- CONTENIDO -->
      <div class="flex-1 overflow-y-auto p-4 md:p-8">

        <div class="max-w-[1700px] mx-auto">

          <!-- GRID -->
          <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">

            <!-- FORMULARIO -->
            <div class="xl:col-span-3">

              <div
                class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden sticky top-4">

                <!-- HEADER FORM -->
                <div class="p-5 md:p-8 border-b border-slate-100 bg-gradient-to-br from-white to-slate-50">

                  <h3 class="text-xl md:text-2xl font-black text-slate-900">
                    Producto
                  </h3>

                  <p class="text-sm text-slate-500 mt-1">
                    Agrega o actualiza artículos del inventario.
                  </p>

                </div>

                <!-- FORM -->
                <form id="product-form" class="p-5 md:p-8 space-y-6">

                  <!-- NOMBRE -->
                  <div>

                    <label class="block text-sm font-bold text-slate-700 mb-2">
                      Nombre del Producto
                    </label>

                    <input type="text" id="nombre" required placeholder="Ej. Nevera Samsung"
                      class="w-full px-4 py-3 border border-slate-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all bg-slate-50" />

                  </div>

                  <!-- PRECIO Y STOCK -->
                  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

                    <div>

                      <label class="block text-sm font-bold text-slate-700 mb-2">
                        Precio
                      </label>

                      <input type="number" id="precio" required placeholder="0"
                        class="w-full px-4 py-3 border border-slate-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all bg-slate-50" />

                    </div>

                    <div>

                      <label class="block text-sm font-bold text-slate-700 mb-2">
                        Stock
                      </label>

                      <input type="number" id="stock" required placeholder="0"
                        class="w-full px-4 py-3 border border-slate-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all bg-slate-50" />

                    </div>

                  </div>

                  <!-- DESCRIPCION -->
                  <div>

                    <label class="block text-sm font-bold text-slate-700 mb-2">
                      Descripción
                    </label>

                    <textarea id="descripcion" rows="4" placeholder="Descripción del producto..."
                      class="w-full px-4 py-3 border border-slate-200 rounded-2xl resize-none focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all bg-slate-50"></textarea>

                  </div>

                  <!-- BOTONES -->
                  <div class="flex flex-col gap-3">

                    <button type="submit"
                      class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl shadow-lg shadow-indigo-200 transition-all active:scale-[0.98]">
                      Guardar Producto
                    </button>

                    <button type="reset"
                      class="w-full border border-slate-200 text-slate-500 font-bold py-3 rounded-2xl hover:bg-slate-50 transition-all">
                      Limpiar Formulario
                    </button>

                  </div>

                </form>

              </div>

            </div>

            <!-- TABLA -->
            <div class="xl:col-span-9 space-y-8">

              <!-- ESTADISTICAS -->
              <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">

                <!-- TOTAL -->
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">

                  <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">
                    Total Unidades
                  </p>

                  <p id="stat-total" class="text-2xl md:text-3xl font-black text-slate-900">
                    0
                  </p>

                </div>

                <!-- VALOR -->
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm border-l-4 border-l-indigo-500">

                  <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">
                    Valor Inventario
                  </p>

                  <p id="stat-value" class="text-2xl md:text-3xl font-black text-slate-900 break-words">
                    COP 0
                  </p>

                </div>

                <!-- STOCK CRITICO -->
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm border-l-4 border-l-rose-500">

                  <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">
                    Stock Crítico
                  </p>

                  <p id="stat-low" class="text-2xl md:text-3xl font-black text-rose-500">
                    0
                  </p>

                </div>

              </div>

              <!-- TABLA -->
              <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/40 border border-slate-100 overflow-hidden">

                <div class="overflow-x-auto w-full">

                  <table class="w-full min-w-[800px] text-left border-collapse">

                    <!-- HEAD -->
                    <thead>

                      <tr class="bg-slate-50 border-b border-slate-100">

                        <th class="px-6 md:px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                          Producto
                        </th>

                        <th
                          class="px-6 md:px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">
                          Existencias
                        </th>

                        <th
                          class="px-6 md:px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">
                          Precio
                        </th>

                        <th
                          class="px-6 md:px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">
                          Acciones
                        </th>

                      </tr>

                    </thead>

                    <!-- BODY -->
                    <tbody id="inventory-list" class="divide-y divide-slate-50">

                    </tbody>

                  </table>

                </div>

              </div>

            </div>

          </div>

        </div>

      </div>

    </main>

  </div>

  <script type="module" src="/src/main.js"></script>

</body>

</html>
